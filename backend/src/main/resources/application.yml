server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:todoapp;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    secret: "change-this-secret-to-a-long-production-value-please"
    expiration-minutes: 120
  cors:
    allowed-origin: "http://localhost:4200"
---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: jdbc:postgresql://localhost:5432/todoapp
    username: todo
    password: todo
    driver-class-name: org.postgresql.Driver
